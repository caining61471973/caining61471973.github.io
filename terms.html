<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>使用条款 · 思念回响</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC",
      "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif;
    line-height: 1.75;
    color: #1f2937;
    background: #faf7f2;
    -webkit-font-smoothing: antialiased;
  }
  main { max-width: 760px; margin: 0 auto; padding: 40px 24px 80px; }
  header { border-bottom: 1px solid #e5e0d6; padding-bottom: 20px; margin-bottom: 28px; }
  .eyebrow { color: #b48455; font-size: 13px; letter-spacing: 0.16em; text-transform: uppercase; margin-bottom: 8px; }
  h1 { font-size: 28px; margin: 0 0 8px; color: #111827; }
  h2 { font-size: 18px; margin: 32px 0 10px; color: #111827; }
  p, li { font-size: 15px; }
  .meta { color: #6b7280; font-size: 13px; }
  ul { padding-left: 22px; }
  a { color: #b48455; }
  .footer { margin-top: 40px; color: #6b7280; font-size: 13px; border-top: 1px solid #e5e0d6; padding-top: 20px; }
  @media (prefers-color-scheme: dark) {
    body { background: #0f172a; color: #e5e7eb; }
    h1, h2 { color: #f8fafc; }
    header, .footer { border-color: rgba(255,255,255,0.1); }
    .meta, .footer { color: #94a3b8; }
  }
</style>
</head>
